version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: projectbots_db
    restart: always
    environment:
      POSTGRES_USER: projectbots_user
      POSTGRES_PASSWORD: projectbots_secret_2024
      POSTGRES_DB: projectbots_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: projectbots_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: